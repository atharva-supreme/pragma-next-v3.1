n  opacity: 1; transform: translateY(0);\n}\n.js-ready .reveal-delay-1 { transition-delay: 0.08s; }\n.js-ready .reveal-delay-2 { transition-delay: 0.16s; }\n.js-ready .reveal-delay-3 { transition-delay: 0.24s; }\n.js-ready .reveal-delay-4 { transition-delay: 0.32s; }\n.js-ready .reveal-delay-5 { transition-delay: 0.4s; }\n\n\/* Stagger reveal for gift options *\/\n.js-ready .winner-card.visible .gift-option {\n  animation: giftPop 0.7s var(--ease-out) both;\n}\n.js-ready .winner-card.visible .gift-option:nth-child(1) { animation-delay: 0.2s; }\n.js-ready .winner-card.visible .gift-option:nth-child(2) { animation-delay: 0.3s; }\n.js-ready .winner-card.visible .gift-option:nth-child(3) { animation-delay: 0.4s; }\n@keyframes giftPop {\n  from { opacity: 0; transform: translateY(16px) scale(0.97); }\n  to { opacity: 1; transform: translateY(0) scale(1); }\n}\n\n\/* \u2550\u2550\u2550 RESPONSIVE \u2550\u2550\u2550 *\/\n@media (max-width: 968px) {\n  .gift-options { grid-template-columns: 1fr 1fr; }\n}\n@media (max-width: 768px) {\n  .section { padding: 96px 0; }\n  .gift-options { grid-template-columns: 1fr; }\n  .steps-grid { grid-template-columns: 1fr !important; }\n  .steps-grid::before { display: none; }\n  .hero-metrics { gap: 0; row-gap: 28px; }\n  .hero-metric { padding: 0 18px; min-width: 100px; }\n  .hero-metric-value { font-size: 32px; }\n  .winner-card { padding: 28px; border-radius: var(--radius-lg); }\n  .winner-rank { font-size: 64px; top: 16px; right: 20px; }\n  .claim-card { padding: 44px 28px; }\n  .nav-pill a { padding: 6px 10px; font-size: 11px; }\n}\n@media (max-width: 480px) {\n  .container, .container-wide { padding: 0 20px; }\n  .hero h1 { font-size: 40px; }\n  .hero-sub { font-size: 16px; }\n  .section-title { font-size: 32px; }\n  .winner-name { font-size: 21px; }\n  .hero-metric + .hero-metric::before { display: none; }\n}\n\n\/* \u2550\u2550\u2550 REDUCED MOTION \u2550\u2550\u2550 *\/\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, ;&gt;448&lt;\/span&gt; participants. &lt;span class=\&quot;serif\&quot;&gt;23&lt;\/span&gt; winners. If your name's among them below, here's how it works.&lt;\/p&gt;\n\n    &lt;div class=\&quot;claim-hero-steps\&quot;&gt;\n      &lt;div class=\&quot;claim-hero-step\&quot;&gt;\n        &lt;div class=\&quot;claim-hero-step-num\&quot;&gt;01&lt;\/div&gt;\n        &lt;h3 class=\&quot;claim-hero-step-title\&quot;&gt;Choose Your Track&lt;\/h3&gt;\n        &lt;p class=\&quot;claim-hero-step-desc\&quot;&gt;DM Sheldon directly and tell him which track you want &amp;mdash; A, B, or C. He'll coordinate getting your personalized prize to you.&lt;\/p&gt;\n      &lt;\/div&gt;\n      &lt;div class=\&quot;claim-hero-step\&quot;&gt;\n        &lt;div class=\&quot;claim-hero-step-num\&quot;&gt;02&lt;\/div&gt;\n        &lt;h3 class=\&quot;claim-hero-step-title\&quot;&gt;Book a Meeting&lt;\/h3&gt;\n        &lt;p class=\&quot;claim-hero-step-desc\&quot;&gt;Schedule a 30-minute chat with Sheldon at &lt;a href=\&quot;https:\/\/calendly.com\/sheldonz\/meet-with-sheldon\&quot; target=\&quot;_blank\&quot;&gt;calendly.com\/sheldonz&lt;\/a&gt;. A quick conversation about your AI journey and to confirm your prize.&lt;\/p&gt;\n      &lt;\/div&gt;\n      &lt;div class=\&quot;claim-hero-step\&quot;&gt;\n        &lt;div class=\&quot;claim-hero-step-num\&quot;&gt;03&lt;\/div&gt;\n        &lt;h3 class=\&quot;claim-hero-step-title\&quot;&gt;Share the Knowledge&lt;\/h3&gt;\n        &lt;p class=\&quot;claim-hero-step-desc\&quot;&gt;Find a friend at another Supreme Group agency and spend a short meeting showing them your best AI tips and tricks. Cross-pollinate so everyone levels up.&lt;\/p&gt;\n      &lt;\/div&gt;\n    &lt;\/div&gt;\n  &lt;\/div&gt;\n&lt;\/section&gt;\n\n&lt;!-- \u2550\u2550\u2550 SCRATCH-OFF + NAME CHECK \u2550\u2550\u2550 --&gt;\n&lt;section class=\&quot;section section-dark scratch-section\&quot; id=\&quot;scratch\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div cla Color\&quot;\/&gt;&lt;\/svg&gt;\n              &lt;span class=\&quot;music-widget-cta-text\&quot;&gt;Play music&lt;\/span&gt;\n            &lt;\/div&gt;\n            &lt;div class=\&quot;music-icon\&quot;&gt;\n              &lt;span class=\&quot;music-bar\&quot;&gt;&lt;\/span&gt;\n              &lt;span class=\&quot;music-bar\&quot;&gt;&lt;\/span&gt;\n              &lt;span class=\&quot;music-bar\&quot;&gt;&lt;\/span&gt;\n              &lt;span class=\&quot;music-bar\&quot;&gt;&lt;\/span&gt;\n              &lt;span class=\&quot;music-bar\&quot;&gt;&lt;\/span&gt;\n            &lt;\/div&gt;\n          &lt;\/div&gt;\n        &lt;\/button&gt;\n      &lt;\/div&gt;\n\n      &lt;div class=\&quot;hero-scratch-card\&quot;&gt;\n        &lt;div class=\&quot;hero-scratch-content\&quot;&gt;\n          &lt;div class=\&quot;hero-scratch-label\&quot;&gt;Find Out&lt;\/div&gt;\n          &lt;h3 class=\&quot;hero-scratch-headline\&quot;&gt;Enter your &lt;span class=\&quot;serif\&quot;&gt;first name&lt;\/span&gt; to see if you won.&lt;\/h3&gt;\n          &lt;div class=\&quot;lookup-form\&quot;&gt;\n            &lt;input type=\&quot;text\&quot; class=\&quot;lookup-input\&quot; id=\&quot;lookupInput\&quot; placeholder=\&quot;Your first name\&quot; autocomplete=\&quot;off\&quot; spellcheck=\&quot;false\&quot;&gt;\n            &lt;button class=\&quot;lookup-button\&quot; id=\&quot;lookupButton\&quot;&gt;Check the list&lt;\/button&gt;\n          &lt;\/div&gt;\n          &lt;div class=\&quot;lookup-result\&quot; id=\&quot;lookupResult\&quot;&gt;&lt;\/div&gt;\n        &lt;\/div&gt;\n        &lt;canvas class=\&quot;hero-scratch-canvas\&quot; id=\&quot;scratchCanvas\&quot;&gt;&lt;\/canvas&gt;\n      &lt;\/div&gt;\n    &lt;\/div&gt;\n  &lt;\/div&gt;\n&lt;\/section&gt;\n\n&lt;!-- \u2550\u2550\u2550 S TIER (TOP PRIZE) \u2550\u2550\u2550 --&gt;\n&lt;section class=\&quot;section section-dark section-s\&quot; id=\&quot;stier\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\ &quot;gift-title\&quot;&gt;Windsurfing Lessons + Gear&lt;\/div&gt;\n            &lt;div class=\&quot;gift-why\&quot;&gt;Windsurfing in Greece is your dream. Start with premium lessons and a harness setup in Austin, then take it to the Aegean.&lt;\/div&gt;\n            &lt;span class=\&quot;gift-value\&quot;&gt;Up to $500&lt;\/span&gt;\n          &lt;\/div&gt;\n          &lt;div class=\&quot;gift-option\&quot;&gt;\n            &lt;div class=\&quot;gift-track\&quot;&gt;C&lt;\/div&gt;\n            &lt;div class=\&quot;gift-title\&quot;&gt;Premium Austin Food + Soccer Experience&lt;\/div&gt;\n            &lt;div class=\&quot;gift-why\&quot;&gt;Austin FC season tickets or a VIP match-day package, plus a curated taco tour of the best spots in town. Your two loves, combined.&lt;\/div&gt;\n            &lt;span class=\&quot;gift-value\&quot;&gt;Up to $500&lt;\/span&gt;\n          &lt;\/div&gt;\n        &lt;\/div&gt;\n      &lt;\/div&gt;\n\n    &lt;\/div&gt;\n  &lt;\/div&gt;\n&lt;\/section&gt;\n\n&lt;!-- \u2550\u2550\u2550 FOOTER \u2550\u2550\u2550 --&gt;\n&lt;footer class=\&quot;footer\&quot;&gt;\n  &lt;div class=\&quot;container\&quot;&gt;\n    &lt;div class=\&quot;footer-mark\&quot;&gt;\n      &lt;span class=\&quot;footer-mark-dot\&quot;&gt;&lt;\/span&gt;\n      &lt;span class=\&quot;footer-mark-text\&quot;&gt;Supreme Group&lt;\/span&gt;\n    &lt;\/div&gt;\n    &lt;p class=\&quot;footer-text\&quot;&gt;AI Power User Contest &amp;middot; April 2026 &amp;middot; Confidential&lt;\/p&gt;\n  &lt;\/div&gt;\n&lt;\/footer&gt;\n\n&lt;script&gt;\n(function() {\n  'use strict';\n\n  \/\/ Progressive enhancement gate\n  document.documentElement.classList.add('js-ready');\n\n  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  \/\/ \u2550\u2550\u2550 Scroll progress bar \u2550\u2550\u2550\n  const progress = document.getElementById('scrollProgress');\n  function updateProgress() {\n    const h = document.documentElement;\n    const scrolled = h.scrollTop \/ (h.scrollHeight - h.clientHeight);\n    progress.style.width = (scrolled * 100).toFixed(2) + '%';\n  }\n  window.addEventListener('scroll', updateProgress, { passive: true });\n  updateProgress();\n\n  \/\/ \u2550\u2550\u2550 Section reveals \u2550\u2550\u2550\n  const revealObserver = new IntersectionObserver((entries) =&gt; {\n    entries.forEach(entry =&gt; {\n      if (entry.isIntersecting) entry.target.classList.add('visible');\n    });\n  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });\n  document.querySelectorAll('.reveal').forEach(el =&gt; revealObserver.observe(el));\n\n  \/\/ \u2550\u2550\u2550 Counter animation \u2550\u2550\u2550\n  function animateCount(el) {\n    const target = parseInt(el.dataset.count, 10);\n    const prefix = el.dataset.prefix || '';\n    const suffix = el.dataset.suffix || '';\n    const duration = 1600;\n    const startTime = performance.now();\n\n    function tick(now) {\n      const elapsed = now - startTime;\n      const t = Math.min(elapsed \/ duration, 1);\n      const eased = 1 - Math.pow(1 - t, 3);\n      const value = Math.floor(eased * target);\n      el.textContent = prefix + value.toLocaleString() + suffix;\n      if (t &lt; 1) requestAnimationFrame(tick);\n      else el.textContent = prefix + target.toLocaleString() + suffix;\n    }\n    requestAnimationFrame(tick);\n  }\n  const counterObserver = new IntersectionObserver((entries) =&gt; {\n    entries.forEach(entry =&gt; {\n      if (entry.isIntersecting) {\n        animateCount(entry.target);\n        counterObserver.unobserve(entry.target);\n      }\n    });\n  }, { threshold: 0.5 });\n  document.querySelectorAll('[data-count]').forEach(el =&gt; {\n    if (reduceMotion) return;\n    el.textContent = (el.dataset.prefix || '') + '0' + (el.dataset.suffix || '');\n    counterObserver.observe(el);\n  });\n\n  \/\/ \u2550\u2550\u2550 Hero mouse spotlight \u2550\u2550\u2550\n  const heroSpotlight = document.getElementById('heroSpotlight');\n  const hero = document.querySelector('.hero');\n  if (heroSpotlight &amp;&amp; hero &amp;&amp; !reduceMotion) {\n    hero.addEventListener('mousemove', (e) =&gt; {\n      const r = hero.getBoundingClientRect();\n      const x = ((e.clientX - r.left) \/ r.width) * 100;\n      const y = ((e.clientY - r.top) \/ r.height) * 100;\n      heroSpotlight.style.setProperty('--mx', x + '%');\n      heroSpotlight.style.setProperty('--my', y + '%');\n    });\n  }\n\n  \/\/ \u2550\u2550\u2550 Card 3D tilt + spotlight \u2550\u2550\u2550\n  const tiltCards = document.querySelectorAll('[data-tilt]');\n  tiltCards.forEach(card =&gt; {\n    if (reduceMotion) return;\n    let rafId = null;\n    card.addEventListener('mousemove', (e) =&gt; {\n      const r = card.getBoundingClientRect();\n      const x = (e.clientX - r.left) \/ r.width;\n      const y = (e.clientY - r.top) \/ r.height;\n      const tiltY = (x - 0.5) * 4;   \/\/ max 2deg\n      const tiltX = -(y - 0.5) * 4;\n      if (rafId) cancelAnimationFrame(rafId);\n      rafId = requestAnimationFrame(() =&gt; {\n        card.style.setProperty('--tilt-x', tiltX + 'deg');\n        card.style.setProperty('--tilt-y', tiltY + 'deg');\n        card.style.setProperty('--mx', (x * 100) + '%');\n        card.style.setProperty('--my', (y * 100) + '%');\n      });\n    });\n    card.addEventListener('mouseleave', () =&gt; {\n      card.style.setProperty('--tilt-x', '0deg');\n      card.style.setProperty('--tilt-y', '0deg');\n    });\n  });\n\n  \/\/ \u2550\u2550\u2550 Gift option spotlight \u2550\u2550\u2550\n  document.querySelectorAll('.gift-option').forEach(opt =&gt; {\n    if (reduceMotion) return;\n    opt.addEventListener('mousemove', (e) =&gt; {\n      const r = opt.getBoundingClientRect();\n      const x = ((e.clientX - r.left) \/ r.width) * 100;\n      const y = ((e.clientY - r.top) \/ r.height) * 100;\n      opt.style.setProperty('--mx', x + '%');\n      opt.style.setProperty('--my', y + '%');\n    });\n  });\n\n  \/\/ \u2550\u2550\u2550 Floating nav \u2550\u2550\u2550\n  const navPill = document.getElementById('navPill');\n  const heroEl = document.querySelector('.hero');\n  const sections = [\n    { id: 'hero', el: document.getElementById('hero') },\n    { id: 'scratch', el: document.getElementById('scratch') },\n    { id: 'stier', el: document.getElementById('stier') },\n    { id: 'tier1', el: document.getElementById('tier1') },\n    { id: 'tier2', el: document.getElementById('tier2') }\n  ];\n  const navLinks = navPill.querySelectorAll('a');\n\n  function updateNav() {\n    const heroBottom = heroEl.getBoundingClientRect().bottom;\n    if (heroBottom &lt; 80) navPill.classList.add('visible');\n    else navPill.classList.remove('visible');\n\n    \/\/ Active section\n    const mid = window.innerHeight * 0.4;\n    let active = sections[0].id;\n    sections.forEach(s =&gt; {\n      if (s.el) {\n        const r = s.el.getBoundingClientRect();\n        if (r.top &lt;= mid) active = s.id;\n      }\n    });\n    navLinks.forEach(a =&gt; {\n      a.classList.toggle('active', a.dataset.target === active);\n    });\n  }\n  window.addEventListener('scroll', updateNav, { passive: true });\n  updateNav();\n\n  \/\/ Smooth scroll for nav\n  navLinks.forEach(a =&gt; {\n    a.addEventListener('click', (e) =&gt; {\n      e.preventDefault();\n      const target = document.getElementById(a.dataset.target);\n      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    });\n  });\n\n  \/\/ \u2550\u2550\u2550 SCRATCH-OFF TICKET \u2550\u2550\u2550\n  (function scratchTicket() {\n    const canvas = document.getElementById('scratchCanvas');\n    if (!canvas) return;\n    const ctx = canvas.getContext('2d');\n    const dpr = window.devicePixelRatio || 1;\n    let isDrawing = false;\n    let isComplete = false;\n    let lastX = null, lastY = null;\n    let checkTimer = null;\n\n    function paintForeground() {\n      const rect = canvas.getBoundingClientRect();\n      const w = rect.width;\n      const h *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: var(--text-primary);
  background: var(--surface-0);
  line-height: 1.6;
  overflow-x: hidden;
  font-feature-settings: 'ss01', 'cv11', 'ss03';
}

::selection { background: var(--brand-primary); color: white; }

.container { max-width: 1080px; margin: 0 auto; padding: 0 32px; position: relative; }
.container-wide { max-width: 1200px; margin: 0 auto; padding: 0 32px; position: relative; }

/* ═══ SCROLL PROGRESS BAR ═══ */
.scroll-progress {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  width: 0%;
  background: linear-gradient(90deg, var(--brand-primary), var(--brand-accent), var(--brand-accent-2));
  z-index: 1000;
  transition: width 0.05s linear;
  box-shadow: 0 0 12px rgba(108, 60, 225, 0.5);
}

/* ═══ FLOATING NAV PILL ═══ */
.nav-pill {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-120%);
  z-index: 900;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px;
  background: rgba(10, 8, 22, 0.72);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 100px;
  box-shadow: 0 20px 60px rgba(12, 10, 26, 0.25);
  transition: transform 0.6s var(--ease-out), opacity 0.4s ease;
  opacity: 0;
}
.nav-pill.visible {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}
.nav-pill a {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.2px;
  color: rgba(255, 255, 255, 0.6);
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 100px;
  transition: all 0.25s var(--ease-out);
  position: relative;
}
.nav-pill a:hover { color: white; }
.nav-pill a.active {
  background: rgba(255, 255, 255, 0.1);
  color: white;
}

/* ═══ MUSIC WIDGET (album-art player card) ═══ */
.lofi-prompt {
  text-align: center;
  margin-bottom: 44px;
  animation: fadeUp 0.9s var(--ease-out) 0.1s both;
}

.music-widget {
  display: inline-flex;
  align-items: stretch;
  gap: 0;
  padding: 12px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 22px;
  cursor: pointer;
  color: white;
  font-family: inherit;
  text-align: left;
  box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 212, 170, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.06);
  transition: transform 0.3s var(--ease-out), background 0.3s, border-color 0.3s, box-shadow 0.3s;
  max-width: 100%;
  position: relative;
}
.music-widget::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 24px;
  background: linear-gradient(135deg, rgba(0, 212, 170, 0.35), rgba(108, 60, 225, 0.25), rgba(0, 212, 170, 0.35));
  background-size: 200% 200%;
  z-index: -1;
  opacity: 0;
  transition: opacity 0.4s ease;
  filter: blur(8px);
  animation: cardGlowShift 6s ease-in-out infinite;
}
.music-widget:not(.playing)::before {
  opacity: 0.6;
}
.music-widget:hover::before { opacity: 0.9; }
.music-widget.playing::before { opacity: 0; }

@keyframes cardGlowShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.music-widget:hover {
  transform: translateY(-4px);
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(0, 212, 170, 0.4);
  box-shadow: 0 38px 80px rgba(0, 212, 170, 0.3), 0 0 0 1px rgba(0, 212, 170, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
}
.music-widget:active { transform: translateY(-1px); }

/* Album art square */
.music-widget-art {
  position: relative;
  width: 200px;
  height: 200px;
  border-radius: 14px;
  overflow: hidden;
  flex-shrink: 0;
  background: #1a1230;
}
.music-widget-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.7s var(--ease-out), filter 0.5s ease;
}
.music-widget:hover .music-widget-art img {
  transform: scale(1.08);
}
.music-widget.playing .music-widget-art img {
  filter: saturate(1.1);
}

/* Subtle gradient overlay on art for legibility */
.music-widget-art-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(10, 8, 22, 0.45) 100%);
  pointer-events: none;
}

/* Play/Pause overlay container */
.music-widget-play-icon {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(10, 8, 22, 0.3);
  transition: background 0.3s ease, opacity 0.3s ease;
}

/* The big circular play button (the real CTA) */
.music-widget-play-btn {
  position: relative;
  width: 84px;
  height: 84px;
  border-radius: 50%;
  background: var(--brand-accent);
  color: var(--brand-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 14px 40px rgba(0, 212, 170, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
  transition: transform 0.3s var(--ease-spring), box-shadow 0.3s ease, background 0.3s ease;
}
.music-widget-play-btn svg {
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  transition: transform 0.3s var(--ease-spring);
}
.music-widget-play-btn .icon-play { transform: translateX(3px); }

/* Pulsing rings around play button (attention grabber) */
.music-widget-play-btn::before,
.music-widget-play-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(0, 212, 170, 0.6);
  pointer-events: none;
  animation: ringPulseOut 2.4s cubic-bezier(0.16, 1, 0.3, 1) infinite;
}
.music-widget-play-btn::after { animation-delay: 1.2s; }

@keyframes ringPulseOut {
  0% { transform: scale(1); opacity: 0.7; }
  100% { transform: scale(1.8); opacity: 0; }
}

.music-widget:hover .music-widget-play-icon { background: rgba(10, 8, 22, 0.2); }
.music-widget:hover .music-widget-play-btn {
  transform: scale(1.06);
  background: #16E5B9;
  box-shadow: 0 18px 48px rgba(0, 212, 170, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.15) inset;
}

/* Toggle play/pause icon visibility */
.music-widget .icon-pause { display: none; }
.music-widget.playing .icon-play { display: none; }
.music-widget.playing .icon-pause { display: block; }

/* Playing state: hide overlay, stop the rings */
.music-widget.playing .music-widget-play-icon {
  opacity: 0;
  background: rgba(10, 8, 22, 0.4);
}
.music-widget.playing .music-widget-play-btn::before,
.music-widget.playing .music-widget-play-btn::after {
  animation: none;
  opacity: 0;
}
.music-widget.playing:hover .music-widget-play-icon { opacity: 1; }

/* Glowing edge on art when playing */
.music-widget.playing .music-widget-art {
  box-shadow: 0 0 0 1px rgba(0, 212, 170, 0.4), 0 0 32px rgba(0, 212, 170, 0.25);
}

/* Info column */
.music-widget-info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 10px;
  padding: 12px 36px 12px 28px;
  min-width: 280px;
}

.music-widget-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2.4px;
  text-transform: uppercase;
  color: var(--brand-accent);
}
.music-widget-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--brand-accent);
  box-shadow: 0 0 10px var(--brand-accent);
  animation: dotBlink 1.6s ease-in-out infinite;
}
@keyframes dotBlink {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.45; transform: scale(0.75); }
}

.music-widget-title {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: white;
}

/* Explicit play CTA pill */
.music-widget-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 16px 9px 14px;
  background: var(--brand-accent);
  color: var(--brand-dark);
  border-radius: 100px;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.3px;
  width: fit-content;
  box-shadow: 0 8px 22px rgba(0, 212, 170, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
  transition: transform 0.25s var(--ease-out), box-shadow 0.25s ease, background 0.25s ease;
  margin-top: 4px;
}
.music-widget-cta svg {
  transform: translateX(1px);
}
.music-widget:hover .music-widget-cta {
  transform: translateY(-1px);
  background: #16E5B9;
  box-shadow: 0 12px 28px rgba(0, 212, 170, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.25);
}
.music-widget.playing .music-widget-cta { display: none; }

/* Equalizer bars — only visible when playing */
.music-icon {
  display: none;
  align-items: center;
  gap: 4px;
  height: 22px;
  margin-top: 4px;
}
.music-widget.playing .music-icon { display: flex; }
.music-bar {
  display: block;
  width: 3px;
  background: var(--brand-accent);
  border-radius: 2px;
  height: 8px;
  transition: height 0.3s ease;
}
.music-widget.playing .music-bar {
  animation: barBounce 1.1s ease-in-out infinite;
}
.music-widget.playing .music-bar:nth-child(1) { animation-delay: 0s; }
.music-widget.playing .music-bar:nth-child(2) { animation-delay: 0.12s; }
.music-widget.playing .music-bar:nth-child(3) { animation-delay: 0.24s; }
.music-widget.playing .music-bar:nth-child(4) { animation-delay: 0.36s; }
.music-widget.playing .music-bar:nth-child(5) { animation-delay: 0.48s; }

@keyframes barBounce {
  0%, 100% { height: 4px; }
  50% { height: 22px; }
}

@media (max-width: 640px) {
  .music-widget { border-radius: 18px; padding: 10px; }
  .music-widget-art { width: 140px; height: 140px; border-radius: 12px; }
  .music-widget-play-btn { width: 64px; height: 64px; }
  .music-widget-play-btn svg { width: 28px; height: 28px; }
  .music-widget-info { padding: 6px 20px 6px 18px; min-width: 0; gap: 8px; }
  .music-widget-title { font-size: 22px; }
  .music-widget-cta { padding: 8px 14px 8px 12px; font-size: 12px; }
}
@media (max-width: 420px) {
  .music-widget { flex-direction: column; align-items: center; text-align: center; }
  .music-widget-info { padding: 16px 8px 8px; align-items: center; }
  .music-widget-art { width: 100%; max-width: 280px; height: auto; aspect-ratio: 16/9; }
}

/* YouTube player host — hidden via clip-path but rendered for audio */
.yt-player-host {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 200px;
  height: 113px;
  clip-path: inset(50%);
  -webkit-clip-path: inset(50%);
  pointer-events: none;
  z-index: -1;
  opacity: 0.01;
}
.yt-player-host iframe {
  width: 100% !important;
  height: 100% !important;
  border: 0;
}

@media (prefers-reduced-motion: reduce) {
  .music-widget.playing .music-bar { animation: none; height: 12px; }
}

/* ═══ HERO ═══ */
.hero {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  background: var(--brand-dark);
  text-align: center;
  padding: 110px 24px 110px;
  isolation: isolate;
}

/* Animated mesh gradient orbs */
.hero-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.55;
  pointer-events: none;
  will-change: transform;
}
.hero-orb-1 {
  width: 640px; height: 640px;
  background: radial-gradient(circle, var(--brand-primary) 0%, transparent 70%);
  top: -10%; left: 55%;
  animation: drift1 24s ease-in-out infinite;
}
.hero-orb-2 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, var(--brand-accent) 0%, transparent 70%);
  bottom: -15%; left: 5%;
  opacity: 0.35;
  animation: drift2 30s ease-in-out infinite;
}
.hero-orb-3 {
  width: 420px; height: 420px;
  background: radial-gradient(circle, var(--brand-accent-2) 0%, transparent 70%);
  top: 30%; left: 10%;
  opacity: 0.3;
  animation: drift3 26s ease-in-out infinite;
}

/* Animated grid */
.hero-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 0%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 0%, transparent 80%);
  pointer-events: none;
}

/* Mouse spotlight */
.hero-spotlight {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle 400px at var(--mx, 50%) var(--my, 30%), rgba(255,255,255,0.06) 0%, transparent 60%);
  pointer-events: none;
  transition: background 0.2s ease;
}

/* Grain */
.hero-grain {
  position: absolute;
  inset: 0;
  background-image: var(--noise);
  background-size: 200px;
  opacity: 0.06;
  mix-blend-mode: overlay;
  pointer-events: none;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 1080px;
  width: 100%;
}

.hero-title-compact {
  font-size: clamp(26px, 3.6vw, 38px);
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.15;
  color: white;
  margin-bottom: 40px;
  animation: fadeUp 1s var(--ease-out) 0.15s both;
}
.hero-title-mark {
  background: linear-gradient(120deg, var(--brand-accent), var(--brand-accent-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
}

.claim-card-inhero {
  animation: fadeUp 1.1s var(--ease-out) 0.35s both;
}

/* ═══ EDITORIAL CLAIM HERO ═══ */
.hero-claim {
  padding: 140px 24px 160px;
  background: var(--brand-dark);
  position: relative;
  overflow: hidden;
  isolation: isolate;
  text-align: left;
}
.hero-claim-orb {
  position: absolute;
  top: -20%;
  right: -10%;
  width: 800px;
  height: 800px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(108, 60, 225, 0.32) 0%, rgba(108, 60, 225, 0) 60%);
  filter: blur(40px);
  pointer-events: none;
  z-index: 0;
  animation: drift1 36s ease-in-out infinite;
}
.hero-claim-grain {
  position: absolute;
  inset: 0;
  background-image: var(--noise);
  background-size: 220px;
  opacity: 0.05;
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: 0;
}

.claim-hero-content {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

.claim-hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 7px 16px 7px 12px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 100px;
  margin-bottom: 40px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.75);
  animation: fadeUp 0.9s var(--ease-out) 0.1s both;
}
.claim-hero-eyebrow-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--brand-accent);
  box-shadow: 0 0 12px var(--brand-accent);
  position: relative;
}
.claim-hero-eyebrow-dot::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: var(--brand-accent);
  animation: ping 2.4s ease-out infinite;
}

.claim-hero-title {
  font-size: clamp(52px, 8vw, 104px);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 0.98;
  color: white;
  margin-bottom: 32px;
  max-width: 12ch;
  animation: fadeUp 1s var(--ease-out) 0.2s both;
}
.claim-hero-title .serif {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.02em;
  background: linear-gradient(120deg, var(--brand-accent) 0%, var(--brand-accent-2) 50%, var(--brand-primary-soft) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 8s ease-in-out infinite;
}

.claim-hero-subtitle {
  font-size: clamp(18px, 1.6vw, 22px);
  color: rgba(255, 255, 255, 0.58);
  max-width: 720px;
  line-height: 1.55;
  margin-bottom: 96px;
  font-weight: 400;
  animation: fadeUp 1s var(--ease-out) 0.35s both;
}
.claim-hero-subtitle .serif {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.25em;
  color: white;
  letter-spacing: -0.01em;
}

.claim-hero-steps {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 56px;
  animation: fadeUp 1.1s var(--ease-out) 0.5s both;
}

.claim-hero-step {
  position: relative;
  padding-top: 32px;
  border-top: 1px solid rgba(255, 255, 255, 0.14);
  transition: border-color 0.4s ease;
}
.claim-hero-step:hover { border-top-color: rgba(255, 255, 255, 0.3); }

.claim-hero-step-num {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 64px;
  line-height: 1;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.45) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 28px;
  font-feature-settings: 'tnum';
}

.claim-hero-step-title {
  font-size: 22px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.015em;
  margin-bottom: 14px;
  line-height: 1.25;
}

.claim-hero-step-desc {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.55);
  line-height: 1.7;
}
.claim-hero-step-desc a {
  color: var(--brand-accent);
  text-decoration: none;
  border-bottom: 1px solid rgba(0, 212, 170, 0.4);
  transition: border-color 0.25s ease;
}
.claim-hero-step-desc a:hover { border-bottom-color: var(--brand-accent); }

@media (max-width: 900px) {
  .hero-claim { padding: 100px 24px 120px; }
  .claim-hero-steps { grid-template-columns: 1fr; gap: 40px; }
  .claim-hero-title { font-size: clamp(44px, 9vw, 64px); }
  .claim-hero-subtitle { margin-bottom: 64px; }
  .claim-hero-step-num { font-size: 52px; margin-bottom: 20px; }
}
@media (max-width: 480px) {
  .hero-claim { padding: 80px 20px 100px; }
  .claim-hero-title { font-size: 40px; }
  .claim-hero-subtitle { font-size: 16px; }
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 7px 18px 7px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);

  margin-bottom: 36px;

.eyebrow-dot {

.eyebrow-dot::after {

.eyebrow-text {

.hero h1 {

.hero h1 .line:nth-child(1) .word:nth-child(2) { animation-delay: 0.20s; }
.hero h1 .line:nth-child(1) .word:nth-child(3) { animation-delay: 0.30s; }

.hero-sub {

.hero-metrics {

.hero-metric {

.hero-metric + .hero-metric::before {

.hero-metric-value {

.hero-metric-label {

.scroll-cue {

.scroll-cue-label {

.scroll-cue-line {

  overflow: hidden;
}
.scroll-cue-line::after {
  content: '';
  position: absolute;
  top: -50%;
  left: 0;
  width: 100%;
  height: 50%;
  background: linear-gradient(to bottom, transparent, white, transparent);
  animation: scrollLine 2.2s ease-in-out infinite;
}

/* ═══ SECTIONS ═══ */
.section {
  padding: 140px 0;
  position: relative;
}
.section-tinted {
  background: var(--surface-1);
  position: relative;
}
.section-tinted::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(108, 60, 225, 0.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(0, 212, 170, 0.04) 0%, transparent 60%);
  pointer-events: none;
}
.section-dark {
  background: var(--brand-dark);
  color: white;
  position: relative;
  overflow: hidden;
}
.section-dark::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 50% 50% at 10% 20%, rgba(108, 60, 225, 0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 95% 80%, rgba(245, 166, 35, 0.06) 0%, transparent 60%);
  pointer-events: none;
}
.section-dark::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: var(--noise);
  background-size: 200px;
  opacity: 0.04;
  mix-blend-mode: overlay;
  pointer-events: none;
}

.section-header {
  margin-bottom: 64px;
  max-width: 720px;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  color: var(--brand-primary);
  margin-bottom: 18px;
  position: relative;
}
.section-label::before {
  content: '';
  width: 20px; height: 1px;
  background: var(--brand-primary);
  display: inline-block;
}
.section-dark .section-label { color: var(--brand-accent); }
.section-dark .section-label::before { background: var(--brand-accent); }

.section-title {
  font-size: clamp(38px, 5vw, 56px);
  font-weight: 800;
  letter-spacing: -0.035em;
  line-height: 1.05;
  margin-bottom: 20px;
}
.section-title .serif {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-style: italic;
  letter-spacing: -0.02em;
}
.section-dark .section-title { color: white; }

.section-subtitle {
  font-size: 18px;
  color: var(--text-tertiary);
  max-width: 600px;
  line-height: 1.65;
  font-weight: 400;
}
.section-dark .section-subtitle { color: rgba(255,255,255,0.5); }

/* ═══ WINNER CARDS ═══ */
.winners-stack { display: flex; flex-direction: column; gap: 28px; }

.winner-card {
  --tilt-x: 0deg;
  --tilt-y: 0deg;
  --mx: 50%;
  --my: 50%;
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 44px;
  box-shadow: var(--shadow-card);
  transition: transform 0.6s var(--ease-out), box-shadow 0.4s var(--ease-out), border-color 0.4s ease;
  position: relative;
  overflow: hidden;
  transform-style: preserve-3d;
  transform: perspective(1400px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
}
.winner-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle 400px at var(--mx) var(--my), rgba(108, 60, 225, 0.06) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
.winner-card:hover { box-shadow: var(--shadow-float); border-color: rgba(108, 60, 225, 0.15); }
.winner-card:hover::before { opacity: 1; }

.section-dark .winner-card {
  background: rgba(255,255,255,0.035);
  border-color: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.section-dark .winner-card::before {
  background: radial-gradient(circle 400px at var(--mx) var(--my), rgba(0, 212, 170, 0.1) 0%, transparent 60%);
}
.section-dark .winner-card:hover {
  background: rgba(255,255,255,0.055);
  border-color: rgba(255,255,255,0.16);
  box-shadow: 0 24px 60px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(0, 212, 170, 0.12);
}

/* Rank watermark */
.winner-rank {
  position: absolute;
  top: 24px; right: 32px;
  font-size: 96px;
  font-weight: 900;
  letter-spacing: -0.05em;
  color: rgba(12, 10, 26, 0.025);
  line-height: 1;
  font-feature-settings: 'tnum';
  pointer-events: none;
  user-select: none;
  z-index: 0;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  transition: color 0.4s ease, transform 0.6s var(--ease-out);
}
.section-dark .winner-rank {
  color: rgba(255, 255, 255, 0.035);
}
.winner-card:hover .winner-rank {
  color: rgba(108, 60, 225, 0.08);
  transform: scale(1.05);
}
.section-dark .winner-card:hover .winner-rank {
  color: rgba(0, 212, 170, 0.1);
}

.winner-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}
.winner-name {
  font-size: 26px; font-weight: 800; letter-spacing: -0.022em;
  line-height: 1.15;
}
.section-dark .winner-name { color: white; }

.winner-agency {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px 5px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  background: rgba(108, 60, 225, 0.08);
  color: var(--brand-primary);
  transition: all 0.3s var(--ease-out);
}
.winner-agency::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--brand-primary);
  box-shadow: 0 0 8px rgba(108, 60, 225, 0.5);
}
.section-dark .winner-agency {
  background: rgba(0, 212, 170, 0.12);
  color: var(--brand-accent);
}
.section-dark .winner-agency::before {
  background: var(--brand-accent);
  box-shadow: 0 0 8px rgba(0, 212, 170, 0.6);
}
.winner-card:hover .winner-agency { transform: translateY(-1px); }

.winner-tier {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 100px;
  font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  position: relative;
  overflow: hidden;
}
.tier-gold {
  background: linear-gradient(135deg, rgba(245,166,35,0.18), rgba(255,204,85,0.1));
  color: var(--brand-gold);
  border: 1px solid rgba(245,166,35,0.25);
}
.tier-gold::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
  animation: shimmer 4s ease-in-out infinite;
}
.tier-silver {
  background: rgba(148,163,184,0.1);
  color: var(--brand-silver);
  border: 1px solid rgba(148,163,184,0.22);
}
.section-dark .tier-gold {
  background: linear-gradient(135deg, rgba(245,166,35,0.2), rgba(255,204,85,0.12));
  color: #FFCC55;
  border-color: rgba(245,166,35,0.3);
}
.section-dark .tier-silver {
  background: rgba(148,163,184,0.14);
  color: #C5D0DE;
  border-color: rgba(148,163,184,0.3);
}

.winner-role {
  font-size: 13.5px;
  color: var(--text-tertiary);
  margin-bottom: 18px;
  font-weight: 500;
  letter-spacing: 0.1px;
  position: relative;
  z-index: 1;
}
.section-dark .winner-role { color: rgba(255,255,255,0.42); }

.winner-bio {
  font-size: 14.5px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 28px;
  max-width: 720px;
  position: relative;
  z-index: 1;
}
.section-dark .winner-bio { color: rgba(255,255,255,0.6); }

/* ═══ GIFT OPTIONS ═══ */
.gift-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  position: relative;
  z-index: 1;
}

.gift-option {
  --mx: 50%;
  --my: 50%;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 22px;
  transition: transform 0.4s var(--ease-out), border-color 0.3s ease, box-shadow 0.3s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
  isolation: isolate;
}
.gift-option::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle 200px at var(--mx) var(--my), rgba(108, 60, 225, 0.12) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  z-index: -1;
}
.gift-option::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-md);
  padding: 1px;
  background: linear-gradient(135deg, rgba(108, 60, 225, 0), rgba(108, 60, 225, 0));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  transition: background 0.4s ease;
  z-index: 2;
}
.gift-option:hover {
  transform: translateY(-3px);
  border-color: transparent;
}
.gift-option:hover::before { opacity: 1; }
.gift-option:hover::after {
  background: linear-gradient(135deg, rgba(108, 60, 225, 0.6), rgba(0, 212, 170, 0.4));
}

.section-dark .gift-option {
  background: rgba(255,255,255,0.035);
  border-color: rgba(255,255,255,0.08);
}
.section-dark .gift-option::before {
  background: radial-gradient(circle 200px at var(--mx) var(--my), rgba(0, 212, 170, 0.18) 0%, transparent 70%);
}
.section-dark .gift-option:hover::after {
  background: linear-gradient(135deg, rgba(0, 212, 170, 0.6), rgba(245, 166, 35, 0.4));
}

.gift-track {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-soft));
  color: white; font-size: 13px; font-weight: 800;
  margin-bottom: 14px;
  position: relative;
  transition: transform 0.4s var(--ease-spring), box-shadow 0.4s ease;
  box-shadow: 0 4px 12px rgba(108, 60, 225, 0.3);
}
.gift-option:hover .gift-track {
  transform: scale(1.1) rotate(-8deg);
  box-shadow: 0 6px 18px rgba(108, 60, 225, 0.45);
}
.section-dark .gift-track {
  background: linear-gradient(135deg, var(--brand-accent), #00B89A);
  color: var(--brand-dark);
  box-shadow: 0 4px 12px rgba(0, 212, 170, 0.35);
}
.section-dark .gift-option:hover .gift-track {
  box-shadow: 0 6px 18px rgba(0, 212, 170, 0.5);
}

.gift-title {
  font-size: 15.5px; font-weight: 700; margin-bottom: 10px; line-height: 1.35;
  letter-spacing: -0.01em;
}
.section-dark .gift-title { color: white; }

.gift-why {
  font-size: 13px;
  color: var(--text-tertiary);
  line-height: 1.6;
}
.section-dark .gift-why { color: rgba(255,255,255,0.5); }

.gift-value {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 14px; padding: 4px 11px 4px 9px; border-radius: 100px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
  background: rgba(108, 60, 225, 0.08);
  color: var(--brand-primary);
  transition: all 0.3s ease;
}
.gift-value::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--brand-primary);
}
.section-dark .gift-value {
  background: rgba(0, 212, 170, 0.12);
  color: var(--brand-accent);
}
.section-dark .gift-value::before { background: var(--brand-accent); }

/* ═══ CLAIM CARD ═══ */
.claim-card {
  background: linear-gradient(135deg, #6C3CE1 0%, #4A1DB5 60%, #2D0D7F 100%);
  border-radius: var(--radius-2xl);
  padding: 72px 56px;
  text-align: center;
  color: white;
  position: relative;
  overflow: hidden;
  isolation: isolate;
  box-shadow: 0 30px 80px -20px rgba(108, 60, 225, 0.4);
}
.claim-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 60% at 80% 20%, rgba(0,212,170,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 10% 90%, rgba(255,107,157,0.2) 0%, transparent 60%);
  z-index: -1;
}
.claim-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: var(--noise);
  background-size: 200px;
  opacity: 0.08;
  mix-blend-mode: overlay;
  pointer-events: none;
  z-index: -1;
}

.claim-orb {
  position: absolute;
  width: 240px; height: 240px;
  border-radius: 50%;
  filter: blur(60px);
  z-index: -1;
}
.claim-orb-1 {
  background: rgba(0, 212, 170, 0.4);
  top: -60px; right: -40px;
  animation: drift2 18s ease-in-out infinite;
}
.claim-orb-2 {
  background: rgba(255, 107, 157, 0.35);
  bottom: -80px; left: -40px;
  animation: drift3 22s ease-in-out infinite;
}

.claim-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px;
  margin-bottom: 24px;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(255,255,255,0.85);
}
.claim-eyebrow-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--brand-accent);
  box-shadow: 0 0 10px var(--brand-accent);
}

.claim-title {
  font-size: clamp(32px, 4.5vw, 48px);
  font-weight: 800;
  letter-spacing: -0.035em;
  margin-bottom: 18px;
  line-height: 1.05;
}
.claim-title .serif {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-style: italic;
}

.claim-subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.72);
  max-width: 580px;
  margin: 0 auto 48px;
  line-height: 1.65;
}

.steps-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  text-align: left;
  max-width: 880px;
  margin: 0 auto;
  position: relative;
}
.steps-grid::before {
  content: '';
  position: absolute;
  top: 48px;
  left: 12%; right: 12%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  z-index: 0;
}
.step-card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: var(--radius-lg);
  padding: 28px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: all 0.4s var(--ease-out);
  position: relative;
  z-index: 1;
}
.step-card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.22);
}
.step-number {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--brand-accent);
  color: var(--brand-dark);
  font-size: 14px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  box-shadow: 0 6px 18px rgba(0, 212, 170, 0.35);
  position: relative;
}
.step-number::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1px solid rgba(0, 212, 170, 0.4);
  animation: ringPulse 2.5s ease-out infinite;
}
.step-card:nth-child(2) .step-number::after { animation-delay: 0.4s; }
.step-card:nth-child(3) .step-number::after { animation-delay: 0.8s; }

.step-title {
  font-size: 16px; font-weight: 700; color: white;
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.step-desc {
  font-size: 13.5px;
  color: rgba(255,255,255,0.65);
  line-height: 1.65;
}
.step-desc a {
  color: var(--brand-accent);
  text-decoration: none;
  border-bottom: 1px solid rgba(0, 212, 170, 0.4);
  transition: border-color 0.3s ease;
}
.step-desc a:hover { border-bottom-color: var(--brand-accent); }

/* ═══ SCRATCH-OFF SECTION ═══ */
.scratch-section {
  padding: 120px 0 140px;
}
.scratch-host {
  width: 100%;
  max-width: 920px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

/* ═══ SCRATCH CARD + NAME LOOKUP ═══ */
.hero-discover {
  margin-top: 56px;
  width: 100%;
  max-width: 920px;
  display: flex;
  justify-content: center;
  position: relative;
  z-index: 2;
  animation: fadeUp 1.2s var(--ease-out) 0.95s both;
}

.hero-scratch-card {
  position: relative;
  width: 100%;
  min-height: 480px;
  border-radius: var(--radius-2xl);
  overflow: hidden;
  isolation: isolate;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.hero-scratch-content {
  position: relative;
  z-index: 1;
  padding: 80px 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  text-align: center;
  min-height: 480px;
  justify-content: center;
}

.hero-scratch-label {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 18px 8px 14px;
  background: rgba(0, 212, 170, 0.12);
  border: 1px solid rgba(0, 212, 170, 0.22);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--brand-accent);
  margin-bottom: 8px;
}
.hero-scratch-label::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--brand-accent);
  box-shadow: 0 0 12px var(--brand-accent);
}

.hero-scratch-headline {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.2;
  color: white;
  max-width: 640px;
  margin-bottom: 20px;
}
.hero-scratch-headline .serif {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  color: var(--brand-accent);
}

.lookup-form {
  display: flex;
  gap: 12px;
  width: 100%;
  max-width: 580px;
}
.lookup-input {
  flex: 1; min-width: 0;
  padding: 20px 24px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: var(--radius-md);
  color: white;
  font-size: 17px;
  font-weight: 500;
  font-family: inherit;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  outline: none;
  transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
}
.lookup-input::placeholder { color: rgba(255, 255, 255, 0.42); }
.lookup-input:focus {
  border-color: rgba(0, 212, 170, 0.5);
  background: rgba(255, 255, 255, 0.1);
  box-shadow: 0 0 0 4px rgba(0, 212, 170, 0.15);
}

.lookup-button {
  padding: 20px 32px;
  background: linear-gradient(135deg, var(--brand-accent) 0%, #00B89A 100%);
  color: var(--brand-dark);
  border: none;
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.4px;
  cursor: pointer;
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s ease, filter 0.2s ease;
  box-shadow: 0 8px 22px rgba(0, 212, 170, 0.4);
  white-space: nowrap;
}
.lookup-button:hover {
  transform: translateY(-1px);
  box-shadow: 0 12px 30px rgba(0, 212, 170, 0.55);
  filter: brightness(1.06);
}
.lookup-button:active { transform: translateY(0); }

.lookup-result {
  font-size: 15px;
  line-height: 1.55;
  color: rgba(255, 255, 255, 0.7);
  min-height: 22px;
  max-width: 580px;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  margin-top: 6px;
}
.lookup-result.visible {
  opacity: 1;
  transform: translateY(0);
}
.lookup-result.found {
  color: white;
  font-weight: 500;
}
.lookup-result.found strong {
  color: var(--brand-accent);
  font-weight: 700;
}
.lookup-result.miss { color: rgba(255, 255, 255, 0.6); }
.lookup-result .check {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--brand-accent);
  color: var(--brand-dark);
  font-weight: 800;
  font-size: 11px;

/* The scratch surface — overlay on top */
.hero-scratch-canvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 2;
  cursor: url(&quot;data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' width='34' height='34' viewBox='0 0 34 34'&gt;&lt;circle cx='17' cy='17' r='13' fill='rgba(255,255,255,0.25)' stroke='rgba(255,255,255,0.85)' stroke-width='1.5'/&gt;&lt;/svg&gt;&quot;) 17 17, grab;
  touch-action: none;
  transition: opacity 0.7s var(--ease-out);
  border-radius: var(--radius-xl);
}
.hero-scratch-canvas.scratched-out {
  opacity: 0;
  pointer-events: none;
}

/* Found glow on winner card */
@keyframes foundGlow {
  0%, 100% {
    box-shadow: var(--shadow-card);
    transform: perspective(1400px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y)) scale(1);
  }
  50% {
    box-shadow: 0 0 0 4px rgba(108, 60, 225, 0.2), 0 24px 60px rgba(108, 60, 225, 0.3);
    transform: perspective(1400px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y)) scale(1.01);
  }
}
.winner-card.found-highlight {
  animation: foundGlow 1.8s var(--ease-out) 2;
  border-color: rgba(108, 60, 225, 0.35) !important;
}
.section-dark .winner-card.found-highlight {
  animation: foundGlowDark 1.8s var(--ease-out) 2;
  border-color: rgba(0, 212, 170, 0.4) !important;
}
@keyframes foundGlowDark {
  0%, 100% {
    box-shadow: none;
    transform: perspective(1400px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y)) scale(1);
  }
  50% {
    box-shadow: 0 0 0 4px rgba(0, 212, 170, 0.25), 0 24px 60px rgba(0, 212, 170, 0.25);
    transform: perspective(1400px) rotateX(var(--tilt-x)) rotateY(var(--tilt-y)) scale(1.01);
  }
}

/* Confetti */
.confetti-host {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 950;
  overflow: hidden;
}
.confetti {
  position: absolute;
  width: 8px; height: 14px;
  opacity: 0;
  border-radius: 1px;
  animation: confettiFall 2.4s var(--ease-out) forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(80vh) rotate(540deg); opacity: 0; }
}

@keyframes ping {

  100% { transform: scale(3); opacity: 0; }
}
@keyframes ringPulse {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(1.6); opacity: 0; }
}
@keyframes shimmer {
  0% { left: -100%; }
  60%, 100% { left: 100%; }
}

  50% { background-position: 100% 50%; }
}

  to { transform: translateY(0); opacity: 1; }
}

  from { transform: translateY(24px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes scrollLine {
  0% { top: -50%; }
  100% { top: 100%; }
}
@keyframes drift1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(-40px, 30px) scale(1.05); }
  66% { transform: translate(30px, -20px) scale(0.95); }
}

  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(40px, -30px) scale(1.08); }
}

}

/* ═══ REVEAL ═══ */
.reveal { opacity: 1; transform: translateY(0); }
.js-ready .reveal {
  opacity: 0; transform: translateY(40px);
  transition: opacity 0.9s var(--ease-out), transform 0.9s var(--ease-out);
}
.js-ready .reveal.visible {
  opacity: 1; transform: translateY(0);
}
.js-ready .reveal-delay-1 { transition-delay: 0.08s; }
.js-ready .reveal-delay-2 { transition-delay: 0.16s; }
.js-ready .reveal-delay-3 { transition-delay: 0.24s; }
.js-ready .reveal-delay-4 { transition-delay: 0.32s; }
.js-ready .reveal-delay-5 { transition-delay: 0.4s; }

/* Stagger reveal for gift options */
.js-ready .winner-card.visible .gift-option {
  animation: giftPop 0.7s var(--ease-out) both;
}
.js-ready .winner-card.visible .gift-option:nth-child(1) { animation-delay: 0.2s; }
.js-ready .winner-card.visible .gift-option:nth-child(2) { animation-delay: 0.3s; }
.js-ready .winner-card.visible .gift-option:nth-child(3) { animation-delay: 0.4s; }
@keyframes giftPop {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

&lt;script&gt;
(function() {
  'use strict';

  // Progressive enhancement gate
  document.documentElement.classList.add('js-ready');

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ═══ Scroll progress bar ═══
  const progress = document.getElementById('scrollProgress');
  function updateProgress() {
    const h = document.documentElement;
    const scrolled = h.scrollTop / (h.scrollHeight - h.clientHeight);
    progress.style.width = (scrolled * 100).toFixed(2) + '%';
  }
  window.addEventListener('scroll', updateProgress, { passive: true });
  updateProgress();

  // ═══ Section reveals ═══
  const revealObserver = new IntersectionObserver((entries) =&gt; {
    entries.forEach(entry =&gt; {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el =&gt; revealObserver.observe(el));

  // ═══ Counter animation ═══
  function animateCount(el) {
    const target = parseInt(el.dataset.count, 10);
    const prefix = el.dataset.prefix || '';
    const suffix = el.dataset.suffix || '';
    const duration = 1600;
    const startTime = performance.now();

    function tick(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const value = Math.floor(eased * target);
      el.textContent = prefix + value.toLocaleString() + suffix;
      if (t &lt; 1) requestAnimationFrame(tick);
      else el.textContent = prefix + target.toLocaleString() + suffix;
    }
    requestAnimationFrame(tick);
  }
  const counterObserver = new IntersectionObserver((entries) =&gt; {
    entries.forEach(entry =&gt; {
      if (entry.isIntersecting) {
        animateCount(entry.target);
        counterObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.5 });
  document.querySelectorAll('[data-count]').forEach(el =&gt; {
    if (reduceMotion) return;
    el.textContent = (el.dataset.prefix || '') + '0' + (el.dataset.suffix || '');
    counterObserver.observe(el);
  });

  // ═══ Hero mouse spotlight ═══
  const heroSpotlight = document.getElementById('heroSpotlight');
  const hero = document.querySelector('.hero');
  if (heroSpotlight &amp;&amp; hero &amp;&amp; !reduceMotion) {
    hero.addEventListener('mousemove', (e) =&gt; {
      const r = hero.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width) * 100;
      const y = ((e.clientY - r.top) / r.height) * 100;
      heroSpotlight.style.setProperty('--mx', x + '%');
      heroSpotlight.style.setProperty('--my', y + '%');
    });
  }

  // ═══ Card 3D tilt + spotlight ═══
  const tiltCards = document.querySelectorAll('[data-tilt]');
  tiltCards.forEach(card =&gt; {
    if (reduceMotion) return;
    let rafId = null;
    card.addEventListener('mousemove', (e) =&gt; {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width;
      const y = (e.clientY - r.top) / r.height;
      const tiltY = (x - 0.5) * 4;   // max 2deg
      const tiltX = -(y - 0.5) * 4;
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() =&gt; {
        card.style.setProperty('--tilt-x', tiltX + 'deg');
        card.style.setProperty('--tilt-y', tiltY + 'deg');
        card.style.setProperty('--mx', (x * 100) + '%');
        card.style.setProperty('--my', (y * 100) + '%');
      });
    });
    card.addEventListener('mouseleave', () =&gt; {
      card.style.setProperty('--tilt-x', '0deg');
      card.style.setProperty('--tilt-y', '0deg');
    });
  });

  const navPill = document.getElementById('navPill');

  function updateNav() {

  // ═══ SCRATCH-OFF TICKET ═══
  (function scratchTicket() {
    const canvas = document.getElementById('scratchCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let isDrawing = false;
    let isComplete = false;
    let lastX = null, lastY = null;
    let checkTimer = null;

    function paintForeground() {
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      // Metallic foil gradient (silver → gold → silver)
      const grad = ctx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, '#B8BBC5');
      grad.addColorStop(0.22, '#E0E3EA');
      grad.addColorStop(0.5, '#F0C84A');
      grad.addColorStop(0.78, '#E0E3EA');
      grad.addColorStop(1, '#B8BBC5');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Diagonal hatch for texture
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.lineWidth = 1;
      for (let i = -h; i &lt; w + h; i += 9) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i + h, h);
        ctx.stroke();
      }

      // Counter-hatch
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
      for (let i = -h; i &lt; w + h; i += 14) {
        ctx.beginPath();
        ctx.moveTo(i + h, 0);
        ctx.lineTo(i, h);
        ctx.stroke();
      }

      // Vignette
      const shadow = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h)/1.3);
      shadow.addColorStop(0, 'rgba(0,0,0,0)');
      shadow.addColorStop(1, 'rgba(0,0,0,0.22)');
      ctx.fillStyle = shadow;
      ctx.fillRect(0, 0, w, h);

      // Center text
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Tiny label
      ctx.fillStyle = 'rgba(40, 25, 70, 0.6)';
      ctx.font = '800 13px Inter, sans-serif';
      const tinySpaced = 'A R E   Y O U   A   W I N N E R ?';
      ctx.fillText(tinySpaced, w / 2, h / 2 - 52);

      // Main &quot;SCRATCH&quot; text
      ctx.fillStyle = 'rgba(30, 18, 60, 0.82)';
      ctx.font = '900 42px Inter, sans-serif';
      const text = 'S C R A T C H';
      ctx.fillText(text, w / 2, h / 2);

      // Subtext
      ctx.fillStyle = 'rgba(40, 25, 70, 0.55)';
      ctx.font = '500 14px Inter, sans-serif';
      ctx.fillText('drag across the foil to reveal', w / 2, h / 2 + 46);

      // Corner crosshairs
      ctx.strokeStyle = 'rgba(40, 25, 70, 0.32)';
      ctx.lineWidth = 1.2;
      const m = 24, l = 18;
      // top-left
      ctx.beginPath(); ctx.moveTo(m, m); ctx.lineTo(m + l, m); ctx.moveTo(m, m); ctx.lineTo(m, m + l); ctx.stroke();
      // top-right
      ctx.beginPath(); ctx.moveTo(w - m, m); ctx.lineTo(w - m - l, m); ctx.moveTo(w - m, m); ctx.lineTo(w - m, m + l); ctx.stroke();
      // bottom-left
      ctx.beginPath(); ctx.moveTo(m, h - m); ctx.lineTo(m + l, h - m); ctx.moveTo(m, h - m); ctx.lineTo(m, h - m - l); ctx.stroke();
      // bottom-right
      ctx.beginPath(); ctx.moveTo(w - m, h - m); ctx.lineTo(w - m - l, h - m); ctx.moveTo(w - m, h - m); ctx.lineTo(w - m, h - m - l); ctx.stroke();
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    function scratch(x, y) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, 36, 0, Math.PI * 2);
      ctx.fill();

      if (lastX !== null &amp;&amp; lastY !== null) {
        ctx.lineWidth = 72;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'rgba(0,0,0,1)';
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
      }
      lastX = x;
      lastY = y;
    }

    function checkProgress() {
      const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      let cleared = 0;
      let total = 0;
      // Sample every 16th pixel
      for (let i = 3; i &lt; data.length; i += 64) {
        total++;
        if (data[i] &lt; 80) cleared++;
      }
      return cleared / total;
    }

    function complete() {
      if (isComplete) return;
      isComplete = true;
      canvas.classList.add('scratched-out');
    }

    function start(e) {
      if (isComplete) return;
      isDrawing = true;
      lastX = null; lastY = null;
      const p = getPos(e);
      scratch(p.x, p.y);
      e.preventDefault();
    }
    function move(e) {
      if (!isDrawing || isComplete) return;
      const p = getPos(e);
      scratch(p.x, p.y);
      e.preventDefault();
      if (!checkTimer) {
        checkTimer = setTimeout(() =&gt; {
          checkTimer = null;
          if (checkProgress() &gt; 0.45) complete();
        }, 250);
      }
    }
    function end() {
      if (!isDrawing) return;
      isDrawing = false;
      lastX = null; lastY = null;
      if (!isComplete &amp;&amp; checkProgress() &gt; 0.42) complete();
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);

    // Paint on load + resize
    function repaint() {
      if (isComplete) return;
      paintForeground();
    }
    // Wait for layout
    requestAnimationFrame(() =&gt; requestAnimationFrame(repaint));
    let resizeTimer;
    window.addEventListener('resize', () =&gt; {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(repaint, 150);
    });
  })();

  // ═══ NAME LOOKUP ═══
  (function nameLookup() {
    const input = document.getElementById('lookupInput');
    const button = document.getElementById('lookupButton');
    const result = document.getElementById('lookupResult');
    if (!input || !button || !result) return;

    function normalize(s) {
      return s.toLowerCase()
        .replace(/,\s*phd/g, '')
        .replace(/[^a-z\s-]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    const winners = Array.from(document.querySelectorAll('.winner-name')).map(el =&gt; {
      const norm = normalize(el.textContent);
      const parts = norm.split(' ');
      return {
        raw: el.textContent.trim(),
        norm: norm,
        first: parts[0],
        last: parts[parts.length - 1] || '',
        card: el.closest('.winner-card')
      };
    });

    function findMatches(query) {
      const q = normalize(query);
      if (!q || q.length &lt; 2) return [];
      const seen = new Set();
      const add = (arr, w) =&gt; { if (!seen.has(w)) { seen.add(w); arr.push(w); } };

      // 1. Exact full name
      const exact = [];
      winners.forEach(w =&gt; { if (w.norm === q) add(exact, w); });
      if (exact.length === 1) return exact;

      // 2. Exact first OR last name match
      const nameMatch = [];
      winners.forEach(w =&gt; {
        if (w.first === q || w.last === q) add(nameMatch, w);
      });
      if (nameMatch.length &gt;= 1) return nameMatch;

      // 3. Full name contains query (e.g., &quot;robyn kiy&quot; contains &quot;kiy&quot;)
      const contains = [];
      winners.forEach(w =&gt; { if (w.norm.includes(q)) add(contains, w); });
      if (contains.length &gt;= 1) return contains;

      // 4. First/last starts with query (loose match, min 3 chars)
      const startsWith = [];
      if (q.length &gt;= 3) {
        winners.forEach(w =&gt; {
          if (w.first.startsWith(q) || w.last.startsWith(q)) add(startsWith, w);
        });
      }
      return startsWith;
    }

    function showResult(html, type) {
      result.innerHTML = html;
      result.className = 'lookup-result visible ' + (type || '');
    }

    function lookup() {
      const query = input.value.trim();
      if (!query) {
        result.className = 'lookup-result';
        result.innerHTML = '';
        return;
      }
      const matches = findMatches(query);

      if (matches.length === 0) {
        showResult(&quot;Not on this list &amp;mdash; you're one of 448 who took part. DM Sheldon to find out where you placed.&quot;, 'miss');
        return;
      }

      if (matches.length === 1) {
        const m = matches[0];
        showResult('&lt;span class=&quot;check&quot;&gt;&amp;#10003;&lt;/span&gt; Yes &amp;mdash; &lt;strong&gt;' + m.raw + '&lt;/strong&gt;. Scrolling to your card&amp;hellip;', 'found');
        setTimeout(() =&gt; {
          m.card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          m.card.classList.add('found-highlight');
          burstConfetti(m.card);
          setTimeout(() =&gt; m.card.classList.remove('found-highlight'), 4500);
        }, 650);
        return;
      }

      // Multiple matches — show names and ask for last name too
      const names = matches.map(m =&gt; m.raw).join(', ');
      showResult('Multiple winners match (' + names + '). Try your full name.', 'miss');
    }

    button.addEventListener('click', lookup);
    input.addEventListener('keydown', (e) =&gt; {
      if (e.key === 'Enter') {
        e.preventDefault();
        lookup();
      }
    });
    input.addEventListener('input', () =&gt; {
      if (result.classList.contains('visible')) {
        result.classList.remove('visible', 'found', 'miss');
      }
    });
  })();

  // ═══ MUSIC WIDGET (YouTube IFrame Player API) ═══
  (function musicWidget() {
    const widget = document.getElementById('musicWidget');
    const playerHost = document.getElementById('ytPlayer');
    if (!widget || !playerHost) return;

    const label = widget.querySelector('.music-widget-label-text');
    const videoId = '7XXu_-eoxHo';
    let ytPlayer = null;
    let ytReady = false;
    let isPlaying = false;
    let pendingAction = null;   // 'play' or 'pause' queued before ready

    function setUiPlaying() {
      isPlaying = true;
      widget.classList.add('playing');
      if (label) label.textContent = 'Now playing';
      widget.setAttribute('aria-label', 'Pause Lofi Tokyo Vibes');
    }
    function setUiPaused() {
      isPlaying = false;
      widget.classList.remove('playing');
      if (label) label.textContent = 'Tap to play';
      widget.setAttribute('aria-label', 'Play Lofi Tokyo Vibes');
    }

    function ensureScript() {
      if (window.YT &amp;&amp; window.YT.Player) {
        initPlayer();
        return;
      }
      if (document.querySelector('script[data-yt-api]')) return;
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      tag.setAttribute('data-yt-api', '1');
      document.head.appendChild(tag);
    }

    function initPlayer() {
      if (ytPlayer || !window.YT || !window.YT.Player) return;
      ytPlayer = new YT.Player('ytPlayer', {
        height: '113',
        width: '200',
        videoId: videoId,
        playerVars: {
          autoplay: 0,
          controls: 0,
          loop: 1,
          playlist: videoId,
          playsinline: 1,
          modestbranding: 1,
          rel: 0,
          fs: 0
        },
        events: {
          onReady: function () {
            ytReady = true;
            if (pendingAction === 'play') {
              ytPlayer.playVideo();
            } else if (pendingAction === 'pause') {
              ytPlayer.pauseVideo();
            }
            pendingAction = null;
          },
          onStateChange: function (e) {
            // YT.PlayerState: PLAYING=1, PAUSED=2, ENDED=0
            if (e.data === 1) setUiPlaying();
            else if (e.data === 2 || e.data === 0) setUiPaused();
          }
        }
      });
    }

    // Hook YouTube's global ready callback
    const prevReady = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = function () {
      if (typeof prevReady === 'function') {
        try { prevReady(); } catch (e) {}
      }
      initPlayer();
    };

    widget.addEventListener('click', function () {
      // First click loads the API
      if (!window.YT) ensureScript();

      if (!ytReady || !ytPlayer) {
        pendingAction = isPlaying ? 'pause' : 'play';
        // Optimistic UI
        if (isPlaying) setUiPaused();
        else setUiPlaying();
        return;
      }

      if (isPlaying) {
        ytPlayer.pauseVideo();
      } else {
        ytPlayer.playVideo();
      }
    });
  })();

  // ═══ CONFETTI BURST ═══
  function burstConfetti(targetEl) {
    if (reduceMotion) return;
    let host = document.querySelector('.confetti-host');
    if (!host) {
      host = document.createElement('div');
      host.className = 'confetti-host';
      document.body.appendChild(host);
    }
    const rect = targetEl ? targetEl.getBoundingClientRect() : null;
    const originX = rect ? (rect.left + rect.width / 2) : window.innerWidth / 2;
    const originY = rect ? (rect.top + 60) : window.innerHeight / 3;
    const colors = ['#6C3CE1', '#8B5CF6', '#00D4AA', '#FF6B9D', '#F5A623', '#FFCC55'];
    const count = 80;
    for (let i = 0; i &lt; count; i++) {
      const piece = document.createElement('span');
      piece.className = 'confetti';
      piece.style.left = (originX + (Math.random() - 0.5) * 200) + 'px';
      piece.style.top = originY + 'px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (6 + Math.random() * 6) + 'px';
      piece.style.height = (10 + Math.random() * 8) + 'px';
      piece.style.animationDelay = (Math.random() * 0.3) + 's';
      piece.style.animationDuration = (1.8 + Math.random() * 1.2) + 's';
      piece.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
      host.appendChild(piece);
      setTimeout(() =&gt; piece.remove(), 3500);
    }
  }

})();
